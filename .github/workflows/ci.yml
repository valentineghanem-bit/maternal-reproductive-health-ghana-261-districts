name: CI — Lint and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies (geospatial)
      run: |
        sudo apt-get update
        sudo apt-get install -y libgdal-dev libproj-dev libgeos-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Syntax check — all Python scripts
      run: |
        python -m py_compile scripts/01_data_cleaning.py
        python -m py_compile scripts/02_spatial_analysis.py
        python -m py_compile scripts/03_ml_pipeline.py
        python -m py_compile scripts/04_visualisations.py
        python -m py_compile scripts/build_final_dataset.py
        echo "All Python scripts syntax-clean"

    - name: Run pytest (unit + canonical value tests)
      run: |
        pytest tests/ -v --tb=short
      continue-on-error: true   # canonical values will skip until Phase 8

    - name: Check requirements are resolvable
      run: pip check
